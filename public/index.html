<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mejora Continua</title>
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <style>
    @font-face {
      font-family: 'LeagueSpartan';
      src: url('LeagueSpartan-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'BwModelica';
      src: url('BwModelica-Medium.otf') format('opentype');
      font-weight: 500;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #fff; font-family: 'BwModelica', 'Segoe UI', sans-serif; }

    .page {
      min-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    /* BADGE */
    .badge-row {
      padding: 28px 40px 0 40px;
    }
    .badge {
      display: inline-block;
      border: 1.5px solid #bbb;
      border-radius: 999px;
      padding: 7px 20px;
      font-family: 'BwModelica', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #333;
      text-transform: uppercase;
    }

    /* GRID PRINCIPAL */
    .hero-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 72px);
    }

    /* IMAGEN IZQUIERDA */
    .col-img {
      overflow: hidden;
      position: relative;
    }
    .col-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      position: absolute;
      inset: 0;
    }

    /* CONTENIDO DERECHO */
    .col-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 64px 48px 56px;
    }

    /* LOGO */
    .logo {
      margin-bottom: 40px;
    }
    .logo img {
      height: 72px;
      width: auto;
      display: block;
    }

    /* HEADLINE */
    h1 {
      font-family: 'LeagueSpartan', sans-serif;
      font-weight: 700;
      font-size: clamp(52px, 6vw, 78px);
      line-height: 1.0;
      color: #020659;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 28px;
    }

    /* SUBTEXT */
    .subtext {
      font-family: 'BwModelica', sans-serif;
      font-size: clamp(15px, 1.5vw, 17px);
      line-height: 1.7;
      color: #444;
      max-width: 340px;
      margin-bottom: 36px;
    }

    /* BOTÓN */
    .cta {
      display: inline-block;
      background: #020659;
      color: #fff;
      font-family: 'BwModelica', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 15px 40px;
      border-radius: 6px;
      text-decoration: none;
      align-self: flex-start;
      margin-bottom: 10px;
      transition: background 0.2s, transform 0.15s;
    }
    .cta:hover { background: #1C4D8C; transform: translateY(-2px); }

    .cta-note {
      display: block;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 40px;
    }

    /* CONTACTO */
    .contact {
      border-top: 1px solid #F0F0F0;
      padding-top: 28px;
      max-width: 340px;
    }
    .contact .nombre {
      display: block;
      font-family: 'LeagueSpartan', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #020659;
      margin-bottom: 2px;
    }
    .contact .cargo {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 14px;
    }
    .contact-links { display: flex; flex-direction: column; gap: 5px; }
    .contact-links a {
      font-size: 13px;
      font-weight: 500;
      color: #1C4D8C;
      text-decoration: none;
    }
    .contact-links a:hover { text-decoration: underline; }

    /* MOBILE */
    @media (max-width: 768px) {
      .badge-row { padding: 24px 24px 0; }
      .hero-grid { grid-template-columns: 1fr; min-height: auto; }
      .col-img { height: 340px; position: relative; }
      .col-img img { position: absolute; }
      .col-content { padding: 36px 24px 56px; }
      h1 { font-size: 44px; }
      .cta { align-self: stretch; text-align: center; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="badge-row">
    <span class="badge">Nuevo sitio en camino</span>
  </div>

  <div class="hero-grid">

    <div class="col-img">
      <img src="ImagenDestacada.png" alt="Mejora Continua">
    </div>

    <div class="col-content">

      <div class="logo">
        <img src="MC1A.png" alt="Mejora Continua">
      </div>

      <h1>Vos<br>querés<br>resultados</h1>

      <p class="subtext">Las ideas, los procesos y los sueños solo valen si se transforman en acciones con impacto.</p>

      <a class="cta" href="https://wa.me/5493764358152">Hablemos</a>
      <span class="cta-note">Sin costo. Sin compromiso.</span>

      <div class="contact">
        <span class="nombre">Sindy Geisert</span>
        <span class="cargo">Directora Ejecutiva</span>
        <div class="contact-links">
          <a href="mailto:sindygeisert@mejoraok.com">sindygeisert@mejoraok.com</a>
          <a href="https://wa.me/5493764358152">+54 9 376 435-8152</a>
          <a href="https://instagram.com/mejoraok" target="_blank">@mejoraok</a>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
